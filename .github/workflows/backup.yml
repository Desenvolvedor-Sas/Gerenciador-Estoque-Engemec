name: Backup Automático Firebase

on:
  schedule:
    - cron: '0 3 * * *'   # Todo dia às 03:00 (horário UTC = meia-noite de Brasília)
  workflow_dispatch:        # Permite rodar manualmente pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Baixar dados do Firebase
        run: |
          mkdir -p backups
          DATE=$(date '+%Y-%m-%d')
          curl -s "${{ secrets.FIREBASE_DB_URL }}/store.json?auth=${{ secrets.FIREBASE_DB_SECRET }}" \
            -o "backups/backup-${DATE}.json"
          echo "Backup salvo: backups/backup-${DATE}.json"

      - name: Manter apenas os últimos 30 backups
        run: |
          cd backups
          ls -t backup-*.json | tail -n +31 | xargs -r rm --
          echo "Limpeza concluída"

      - name: Commit e push do backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "backup: $(date '+%Y-%m-%d')"
          git push
